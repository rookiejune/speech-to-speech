defaults:
  - model: default
  - runtime: longcat_native
  - codec_oracle: default
  - trainer: default
  - logging: tensorboard
  - callback/codec_oracle@callbacks
  - _self_
  - experiment: null

repo_output_root: ${oc.env:SPEECH_TO_SPEECH_TRAIN_ROOT,${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech}
output_subdir: 005-codec-oracle/${runtime.codec}/${codec_oracle.objective}-${codec_oracle.decoder.layers}l/${codec_oracle.initialization}
output_dir: ${repo_output_root}/${output_subdir}

train:
  seed: 0
  max_steps: 1000000

hydra:
  job:
    chdir: false
  run:
    dir: ${output_dir}/hydra
  output_subdir: config
