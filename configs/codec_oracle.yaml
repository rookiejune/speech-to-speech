defaults:
  - model: default
  - runtime: longcat_native
  - codec_oracle: default
  - trainer: default
  - logging: tensorboard
  - callback/codec_oracle@callbacks
  - _self_
  - experiment: null

output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/005-codec-oracle/${runtime.codec}/${codec_oracle.objective}-${codec_oracle.decoder.layers}l/${codec_oracle.initialization}

train:
  seed: 0
  max_steps: 1000000

hydra:
  job:
    chdir: false
  run:
    dir: ${output_dir}/hydra
  output_subdir: config
