# @package _global_
defaults:
  - /model: default
  - /runtime: unicodec
  - /data: wmt19_tts
  - /pl_module: sft
  - /trainer: ddp
  - /logging: tensorboard
  - _self_

task: tts
run_name: token
output_subdir: 005-codec-screening/unicodec/ddp-smoke

data:
  sample_index: 0

callbacks:
  sample:
    enabled: true
    every_n_steps: 1

train:
  seed: 0
  max_steps: 2

trainer:
  log_every_n_steps: 1
  use_distributed_sampler: false
