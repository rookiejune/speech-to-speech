# @package _global_
defaults:
  - /model: default
  - /runtime: unicodec
  - /pl_module: sft
  - /trainer: ddp
  - /logging: tensorboard
  - _self_

task: tts
run_name: token
output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/005-codec-screening/unicodec/formal-ddp

callbacks:
  sample:
    enabled: true
    every_n_steps: 1

data:
  root:
  split: train
  sample_index: 0

train:
  seed: 0
  max_steps: 2

trainer:
  log_every_n_steps: 1
  use_distributed_sampler: false
