# @package _global_
defaults:
  - /model: toy
  - /model/acoustic: none
  - /runtime: longcat_full_sequence
  - /data: toy
  - /pl_module: sft
  - /trainer: default
  - /logging: csv
  - override /parameter_policy: full
  - _self_

task: tts
run_name: longcat-full-sequence-token
output_subdir: longcat-full-sequence-smoke/${task}/${run_name}

data:
  sample_index: 0

runtime:
  device: cpu
  dtype: float32
  attn_implementation:

callbacks:
  task_sample:
    enabled: false
    every_n_steps: 1
  evaluation:
    enabled: false

train:
  seed: 0
  max_steps: 2

trainer:
  accelerator: cpu
  devices: 1
  precision: 32-true
  log_every_n_steps: 1
  enable_checkpointing: false
