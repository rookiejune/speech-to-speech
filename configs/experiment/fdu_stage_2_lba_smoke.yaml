# @package _global_
defaults:
  - override /stage: stage_2
  - override /parameter_policy: speech_interface
  - override /trainer: static_ddp
  - _self_

output_subdir: 013-fdu-stage-lba-smoke/${stage.name}/${run_name}

data:
  dataloader:
    batch_size: 4
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    lba:
      enabled: true
      max_batch_cost: 2048
      token_unit: 1
      frame_unit: 50
      max_padding_ratio: 0.1
      prefetch_batches: 0

text_data:
  dataloader:
    batch_size: 4
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    lba:
      enabled: true
      max_batch_cost: 2048
      token_unit: 1
      frame_unit: 1
      max_padding_ratio: 0.1
      prefetch_batches: 0
  dataset:
    name: toy
    toy_samples: 8

train:
  max_steps: 2

trainer:
  strategy: ddp_find_unused_parameters_true
  log_every_n_steps: 1
  enable_checkpointing: false

callbacks:
  checkpoint:
    every_n_train_steps: 1
