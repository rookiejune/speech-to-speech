# @package _global_

output_subdir: 013-fdu-codec-oracle-smoke/${runtime.codec}/${codec_oracle.objective}-${codec_oracle.decoder.layers}l/${codec_oracle.initialization}

codec_oracle:
  initialization: random
  data:
    sample_limit: 32
    max_seconds: 4.0
    overlong: truncate
    batch_size: 8
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    lba:
      enabled: true
      max_batch_seconds: 8.0
      prefetch_batches: 2

runtime:
  flow_nfe: 4
  flow_num_steps: 2

train:
  max_steps: 2

trainer:
  log_every_n_steps: 1

callbacks:
  performance:
    log_every_n_steps: 1
    warmup_steps: 0
    measure_window_steps: 2
  oracle:
    sample_every_n_steps: 1
    histogram_every_n_steps: 1
  grad_norm:
    every_n_steps: 1
  checkpoint:
    every_n_train_steps: 1
