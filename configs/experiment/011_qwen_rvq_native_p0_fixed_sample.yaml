# @package _global_
defaults:
  - /model: default
  - /model/acoustic: rvq
  - /runtime: longcat_native
  - /data: wmt19_tts
  - /pl_module: sft
  - /trainer: default
  - /logging: tensorboard
  - _self_

task: tts
run_name: ${oc.select:acoustic.name,token}
output_subdir: 011-qwen-rvq-native-p0-fixed-sample/${task}/${run_name}

data:
  sample_index: 0

callbacks:
  sample:
    enabled: false
    every_n_steps: 1
  evaluation:
    enabled: true

train:
  seed: 0
  max_steps: 2

trainer:
  log_every_n_steps: 1
  enable_checkpointing: false
