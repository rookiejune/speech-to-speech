# @package _global_
defaults:
  - /codec: longcat
  - /acoustic: flow
  - /data: wmt19_tts_fixed
  - /runtime: default
  - /optimizer: sft
  - /flow: default
  - /train: single_batch
  - /trainer: overfit
  - /logging: tensorboard
  - _self_

task: tts
output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/002-single-batch-overfit/${task}/${acoustic.type}-${acoustic.decoder.layers}l

callbacks:
  sample:
    enabled: true
    every_n_steps: 1
