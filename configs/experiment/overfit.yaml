# @package _global_
defaults:
  - /model: default
  - /model/acoustic: flow
  - /runtime: longcat
  - /data: wmt19_tts
  - /pl_module: sft
  - /trainer: default
  - /logging: tensorboard
  - _self_

task: tts
run_name: ${oc.select:acoustic.name,token}
output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/002-single-batch-overfit/${task}/${run_name}

callbacks:
  sample:
    enabled: true
    every_n_steps: 1

train:
  seed: 0
  max_steps: 100

trainer:
  log_every_n_steps: 1
  enable_checkpointing: false
