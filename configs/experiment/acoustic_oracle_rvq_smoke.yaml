# @package _global_
defaults:
  - override /codec_oracle: rvq
  - _self_

output_subdir: 005-codec-oracle-smoke/${runtime.codec}/${codec_oracle.objective}-${codec_oracle.decoder.layers}l/${codec_oracle.initialization}

codec_oracle:
  data:
    sample_limit: 1
    max_seconds: 4.0
    overlong: truncate
    batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    lba:
      enabled: false

train:
  max_steps: 2

trainer:
  log_every_n_steps: 1

callbacks:
  performance:
    log_every_n_steps: 1
    warmup_steps: 0
    measure_window_steps: 2
  oracle:
    sample_every_n_steps: 1
    histogram_every_n_steps: 1
  grad_norm:
    every_n_steps: 1
  checkpoint:
    every_n_train_steps: 1
