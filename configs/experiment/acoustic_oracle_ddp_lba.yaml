# @package _global_
defaults:
  - /codec: longcat
  - /acoustic: flow
  - /data: wmt19_tts_lba
  - /runtime: default
  - /init: codec
  - /optimizer: oracle
  - /flow: smoke
  - /train: smoke
  - /trainer: ddp
  - /logging: tensorboard
  - /callback/oracle@callbacks.oracle
  - /callback/grad_norm@callbacks.grad_norm
  - /callback/nonfinite@callbacks.nonfinite
  - /callback/checkpoint@callbacks.checkpoint
  - _self_

output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/005-codec-oracle-ddp-lba/${codec.name}/${acoustic.type}-${acoustic.decoder.layers}l/${init.name}

train:
  max_steps: -1

acoustic:
  normalize_features: false

runtime:
  audio_tokenizer:

trainer:
  strategy: ddp
  precision: bf16-mixed
