# @package _global_
defaults:
  - /codec: longcat
  - /data: wmt19_tts_lba
  - /init: codec
  - /train: smoke
  - /trainer: ddp
  - /logging: tensorboard
  - _self_

output_dir: ${oc.env:DYNAMIC_HOME,outputs}/train/speech-to-speech/005-codec-oracle-ddp-lba/${codec.name}/${init.name}

token:
  layers: 2
  heads: 8
  feedforward_dim: 1024
  dropout: 0.0

train:
  max_steps: -1
  normalize_features: false
