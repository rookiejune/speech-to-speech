# @package _global_

output_subdir: 005-codec-oracle-smoke/${runtime.codec}/${codec_oracle.objective}-${codec_oracle.decoder.layers}l/${codec_oracle.initialization}

codec_oracle:
  data:
    sample_limit: 1
    batch_size: 1
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    lba:
      enabled: false

runtime:
  flow_nfe: 4
  flow_num_steps: 2

train:
  max_steps: 2

trainer:
  log_every_n_steps: 1

callbacks:
  oracle:
    sample_every_n_steps: 1
    histogram_every_n_steps: 1
  grad_norm:
    every_n_steps: 1
  checkpoint:
    every_n_train_steps: 1
