name: stage_3
loaders:
  asr_s2tt:
    weight: 0.45
    task_weights:
      asr: 0.5
      s2tt: 0.5
  tts_t2st:
    weight: 0.45
    task_weights:
      tts: 0.5
      t2st: 0.5
  mt:
    weight: 0.1
    task_weights:
      mt: 1.0
batches_per_step: 10
trainable_groups:
  - backbone
  - semantic_audio_embedding
  - semantic_audio_adapter
  - acoustic_prompt
  - semantic_audio_output
  - acoustic_decoder
frozen_groups: []
backbone_top_fraction: 0.3333333333333333

