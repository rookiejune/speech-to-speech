objective: flow
initialization: codec
normalize_features: true
learning_rate: 0.0003
weight_decay: 0.01
decoder:
  hidden_dim:
  layers: 8
  heads: 8
  ffn_ratio: 4
data:
  root:
  split: train
  sample_index: 0
  max_seconds:
  overlong: error
  sample_limit:
  batch_size: 8
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  lba:
    enabled: true
    max_batch_seconds: 8.0
    max_padding_ratio: 0.05
    prefetch_batches: 4
    planner_mode: quality
    drop_last_flush: true
