objective: rvq
initialization: codec
normalize_features: false
learning_rate: 0.0003
weight_decay: 0.01
decoder:
  hidden_dim:
  layers: 8
  heads: 8
  ffn_ratio: 4
data:
  root:
  split: train
  sample_index: 0
  max_seconds: 4.0
  sample_limit:
  batch_size: 8
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  lba:
    enabled: true
    max_batch_seconds: 8.0
    max_padding_ratio: 0.05
    prefetch_batches: 0
    planner_mode: quality
    drop_last_flush: true
