defaults:
  - stage: stage_1
  - model: default
  - model/acoustic: rvq
  - runtime: longcat_native
  - /data@data.dataset: wmt19_tts
  - pl_module: sft
  - trainer: default
  - logging: tensorboard
  - callback/performance@callbacks.performance
  - _self_
  - experiment: null

run_name: ${stage.name}-${oc.select:acoustic.name,token}
repo_output_root: ${oc.env:SPEECH_TO_SPEECH_TRAIN_ROOT,${oc.env:DYNAMIC_HOME}/train/speech-to-speech}
output_subdir: 011-staged-joint-train/${stage.name}/${run_name}
output_dir: ${repo_output_root}/${output_subdir}

data:
  codec: ${runtime.codec}
  dataloader:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    lba:
      enabled: false

text_data:
  dataloader:
    batch_size: 8
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    lba:
      enabled: false
  dataset:
    name: wmt19
    split: train
    config_name:
    source_lang: zh
    target_lang: en
    toy_samples: 8

train:
  seed: 0
  max_steps: 1000000

trainer:
  strategy: ddp_find_unused_parameters_false
  use_distributed_sampler: false
  log_every_n_steps: 10
  enable_checkpointing: true

callbacks:
  grad_norm:
    enabled: false
    every_n_steps: 100
  checkpoint:
    filename: step-{step:08d}
    save_last: true
    save_top_k: -1
    every_n_train_steps: 10000
  performance:
    enabled: false
